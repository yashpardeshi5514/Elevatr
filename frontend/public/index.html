<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevatr</title>
  <meta name="description" content="AI-powered scholarship, fellowship and internship matching platform." />
  <meta name="theme-color" content="#ffffff" />

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://api.fontshare.com" />

  <!-- Fontshare: Clash Display + Cabinet Grotesk -->
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=cabinet-grotesk@400,500,600,700&display=swap" />

  <style>
    /* prevent flash of dark unstyled content */
    html { background: #f5f7fc; }
    body { margin: 0; background: #f5f7fc; }

    /* Smooth page entry */
    #root { animation: pageIn 0.3s ease; }
    @keyframes pageIn { from{opacity:0} to{opacity:1} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.js"></script>
</body>
</html>
